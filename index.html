<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>مرسل واتساب سريع</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#14171A">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="واتساب سريع">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;600;700;800&display=swap" rel="stylesheet">

<style>
  :root{
    --bg: #14171A;
    --surface: #1E2227;
    --surface-2: #262B31;
    --border: #31373E;
    --text: #F2F4F3;
    --muted: #8B949E;
    --accent: #2FD480;
    --accent-dark: #1FAE68;
    --accent-ink: #06210F;
    --call: #3B82F6;
    --call-dark: #2E6FD9;
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 50% -10%, rgba(47,212,128,0.10), transparent 55%),
      var(--bg);
    color: var(--text);
    font-family: 'Cairo', Arial, sans-serif;
    display:flex;
    justify-content:center;
    padding: 28px 18px 40px;
  }

  .card{
    width:100%;
    max-width: 420px;
  }

  .brand{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
    margin-bottom: 26px;
  }

  .pin-wrap{
    width:56px; height:56px;
    border-radius:16px;
    background: var(--surface);
    border:1px solid var(--border);
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
  }

  .pin-wrap::after{
    content:"";
    position:absolute;
    inset:0;
    border-radius:16px;
    border:1px solid var(--accent);
    opacity:0;
    animation: pulse 2.4s ease-out infinite;
  }

  @keyframes pulse{
    0%   { transform:scale(1);   opacity:0.55; }
    70%  { transform:scale(1.35); opacity:0; }
    100% { transform:scale(1.35); opacity:0; }
  }

  .pin-wrap svg{ width:28px; height:28px; }

  h1{
    font-size: 21px;
    font-weight:700;
    margin:0;
    letter-spacing:0.2px;
  }

  .subtitle{
    font-size:15px;
    color:var(--muted);
    margin:0;
    font-weight:500;
  }

  label{
    display:block;
    font-size:15px;
    font-weight:600;
    color:var(--muted);
    margin: 18px 4px 8px;
  }

  .field{
    background: var(--surface);
    border:1px solid var(--border);
    border-radius:14px;
    padding: 4px;
  }

  input[type="tel"], select{
    width:100%;
    background:transparent;
    border:none;
    color: var(--text);
    font-family:'Cairo', Arial, sans-serif;
    font-size:19px;
    font-weight:600;
    padding: 16px 12px;
    outline:none;
    appearance:none;
    -webkit-appearance:none;
  }

  input[type="tel"]::placeholder{
    color: var(--muted);
    font-weight:500;
  }

  select{
    direction: rtl;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%238B949E'><path d='M7 10l5 5 5-5z'/></svg>");
    background-repeat:no-repeat;
    background-position: left 12px center;
    padding-left: 34px;
  }

  select option{
    background: var(--surface-2);
    color: var(--text);
  }

  .field:focus-within{
    border-color: var(--accent);
  }

  .field.invalid{
    border-color: #E5484D;
    background: rgba(229,72,77,0.08);
  }

  .field.invalid input[type="tel"]::placeholder{
    color: #E5484D;
  }

  .toast{
    position: fixed;
    left: 50%;
    bottom: 28px;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface-2);
    border: 1px solid #E5484D;
    color: var(--text);
    padding: 12px 18px;
    border-radius: 12px;
    font-size: 14px;
    font-weight:600;
    max-width: 90vw;
    text-align:center;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s ease, transform .25s ease;
    z-index: 50;
  }

  .toast.show{
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .preview{
    margin: 10px 4px 0;
    font-size:14px;
    color: var(--muted);
    line-height:1.6;
    min-height: 34px;
  }

  .actions{
    margin-top:22px;
    display:flex;
    flex-direction:column;
    gap:12px;
  }

  button{
    width:100%;
    border:none;
    border-radius:14px;
    font-family:'Cairo', Arial, sans-serif;
    font-size:19px;
    font-weight:700;
    padding:18px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    cursor:pointer;
    transition: transform .12s ease, filter .12s ease;
  }

  button svg{ width:20px; height:20px; }

  button:active{ transform: scale(0.98); }

  .btn-whatsapp{
    background: var(--accent);
    color: var(--accent-ink);
  }
  .btn-whatsapp:active{ background: var(--accent-dark); }

  .btn-call{
    background: transparent;
    color: var(--call);
    border: 1.5px solid var(--call);
  }
  .btn-call:active{ background: rgba(59,130,246,0.12); }

  .hint{
    text-align:center;
    font-size:13px;
    color: var(--muted);
    margin-top:18px;
  }

  .divider{
    border:none;
    border-top:1px solid var(--border);
    margin: 26px 0 16px;
  }

  .section-label{
    font-size:13px;
    font-weight:700;
    color: var(--muted);
    margin: 0 4px 10px;
    letter-spacing:0.3px;
  }

  .constants-row{
    display:flex;
    gap:10px;
  }

  .btn-secondary{
    flex:1;
    font-size:14.5px;
    font-weight:700;
    padding:13px 8px;
    border-radius:12px;
    border:1.5px solid var(--border);
    background: var(--surface);
    color: var(--text);
  }

  .btn-secondary svg{ width:17px; height:17px; }

  .btn-secondary.wa-const{ color: var(--accent); border-color: rgba(47,212,128,0.4); }
  .btn-secondary.wa-const:active{ background: rgba(47,212,128,0.1); }

  .btn-secondary.call-const{ color: var(--call); border-color: rgba(59,130,246,0.4); }
  .btn-secondary.call-const:active{ background: rgba(59,130,246,0.1); }

  @media (prefers-reduced-motion: reduce){
    .pin-wrap::after{ animation:none; }
  }
</style>
</head>
<body>
<div class="card">

  <div class="brand">
    <div class="pin-wrap">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M12 22s7-7.2 7-12.5A7 7 0 0 0 5 9.5C5 14.8 12 22 12 22Z" fill="#2FD480"/>
        <circle cx="12" cy="9.3" r="2.6" fill="#14171A"/>
      </svg>
    </div>
    <h1>مرسل واتساب سريع</h1>
    <p class="subtitle">مطعم شهبندر · طلب اللوكيشن من العميل</p>
  </div>

  <label for="recent">آخر الأرقام</label>
  <div class="field">
    <select id="recent">
      <option value="" selected>اختر من آخر 10 أرقام...</option>
    </select>
  </div>

  <label for="phone">رقم العميل</label>
  <div class="field" id="phoneField">
    <input type="tel" id="phone" inputmode="tel" placeholder="مثال: 0501234567" autocomplete="tel">
  </div>

  <label for="msg">الرسالة</label>
  <div class="field">
    <select id="msg">
      <option value="أنا سائق التوصيل من مطعم شهبندر، ممكن تبعتلي اللوكيشن والعنوان؟">طلب اللوكيشن والعنوان</option>
      <option value="أنا سائق التوصيل من مطعم شهبندر، وصلت تحت، ممكن رقم الشقة أو المكتب؟">وصلت تحت (شقة/مكتب)</option>
      <option value="أنا سائق التوصيل من مطعم شهبندر، وصلت تحت، ممكن رقم الفيلا؟">وصلت تحت (فيلا)</option>
      <option value="طلبكم من مطعم شهبندر في الطريق، هوصل خلال ٥ دقايق">الطلب في الطريق (٥ دقايق)</option>
      <option value="أنا سائق التوصيل من مطعم شهبندر، مش لاقي المكان بالظبط، ممكن تبعتلي لوكيشن لايف؟">مش لاقي المكان</option>
      <option value="حاولت أتصل بيكم ومحدش رد، أنا سائق التوصيل من مطعم شهبندر، برجاء الرد على الواتساب">حاولت أتصل ومحدش رد</option>
    </select>
  </div>

  <p class="preview" id="preview"></p>

  <div class="actions">
    <button class="btn-whatsapp" onclick="sendToWhatsapp()">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.45 1.32 4.95L2 22l5.29-1.39a9.9 9.9 0 0 0 4.75 1.21h.01c5.46 0 9.9-4.45 9.9-9.91C21.96 6.45 17.5 2 12.04 2zm5.8 14.02c-.24.68-1.4 1.3-1.93 1.38-.5.08-1.12.11-1.81-.11-.42-.13-.95-.31-1.64-.6-2.88-1.24-4.76-4.13-4.9-4.32-.14-.19-1.17-1.56-1.17-2.97 0-1.41.74-2.1 1-2.39.26-.28.57-.35.76-.35.19 0 .38 0 .55.01.18.01.42-.07.65.5.24.58.81 2 .88 2.14.07.14.12.31.02.5-.09.19-.14.31-.28.48-.14.16-.29.36-.42.49-.14.14-.28.29-.12.57.16.28.7 1.16 1.51 1.89 1.04.93 1.91 1.22 2.19 1.36.28.14.44.12.6-.07.16-.19.68-.79.87-1.06.18-.28.37-.23.62-.14.26.09 1.63.77 1.91.91.28.14.47.21.54.33.07.12.07.71-.17 1.39z"/></svg>
      افتح واتساب
    </button>
    <button class="btn-call" onclick="callCustomer()">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6.62 10.79a15.05 15.05 0 0 0 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.24.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
      اتصال بالعميل
    </button>
  </div>

  <hr class="divider">
  <p class="section-label">الثوابت</p>
  <div class="constants-row">
    <button class="btn-secondary wa-const" onclick="openRestaurantWhatsapp()">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.45 1.32 4.95L2 22l5.29-1.39a9.9 9.9 0 0 0 4.75 1.21h.01c5.46 0 9.9-4.45 9.9-9.91C21.96 6.45 17.5 2 12.04 2zm5.8 14.02c-.24.68-1.4 1.3-1.93 1.38-.5.08-1.12.11-1.81-.11-.42-.13-.95-.31-1.64-.6-2.88-1.24-4.76-4.13-4.9-4.32-.14-.19-1.17-1.56-1.17-2.97 0-1.41.74-2.1 1-2.39.26-.28.57-.35.76-.35.19 0 .38 0 .55.01.18.01.42-.07.65.5.24.58.81 2 .88 2.14.07.14.12.31.02.5-.09.19-.14.31-.28.48-.14.16-.29.36-.42.49-.14.14-.28.29-.12.57.16.28.7 1.16 1.51 1.89 1.04.93 1.91 1.22 2.19 1.36.28.14.44.12.6-.07.16-.19.68-.79.87-1.06.18-.28.37-.23.62-.14.26.09 1.63.77 1.91.91.28.14.47.21.54.33.07.12.07.71-.17 1.39z"/></svg>
      واتساب المطعم
    </button>
    <button class="btn-secondary call-const" onclick="callRestaurant()">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6.62 10.79a15.05 15.05 0 0 0 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.24.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
      اتصال بالمطعم
    </button>
  </div>

  <p class="hint">اضغط على الشاشة الرئيسية "إضافة إلى الشاشة الرئيسية" لتشغيله كتطبيق</p>
</div>

<div class="toast" id="toast"></div>

<script>
  var phoneInput = document.getElementById('phone');
  var msgSelect = document.getElementById('msg');
  var preview = document.getElementById('preview');
  var recentSelect = document.getElementById('recent');

  var RECENT_KEY = 'waSenderRecentNumbers';
  var MAX_RECENT = 10;

  function loadRecent(){
    try {
      var raw = localStorage.getItem(RECENT_KEY);
      var arr = raw ? JSON.parse(raw) : [];
      return Array.isArray(arr) ? arr : [];
    } catch (e) {
      return [];
    }
  }

  function saveRecent(list){
    try {
      localStorage.setItem(RECENT_KEY, JSON.stringify(list));
    } catch (e) {
      // لو التخزين ممنوع أو ممتلئ، بنتجاهل بهدوء من غير ما نكسر الإرسال
    }
  }

  function renderRecentDropdown(){
    var list = loadRecent();
    recentSelect.innerHTML = '';
    var placeholder = document.createElement('option');
    placeholder.value = '';
    placeholder.textContent = list.length ? 'اختر من آخر ' + list.length + ' رقم...' : 'مفيش أرقام محفوظة لسه';
    placeholder.selected = true;
    recentSelect.appendChild(placeholder);
    list.forEach(function(num){
      var opt = document.createElement('option');
      opt.value = num;
      opt.textContent = num;
      recentSelect.appendChild(opt);
    });
  }

  function addToRecent(phone){
    var list = loadRecent();
    list = list.filter(function(n){ return n !== phone; }); // إزالة أي تكرار سابق لنفس الرقم
    list.unshift(phone); // الأحدث في الأول
    if (list.length > MAX_RECENT) {
      list = list.slice(0, MAX_RECENT);
    }
    saveRecent(list);
    renderRecentDropdown();
  }

  recentSelect.addEventListener('change', function(){
    if (this.value) {
      phoneInput.value = this.value;
      phoneInput.focus();
    }
    this.selectedIndex = 0;
  });

  renderRecentDropdown();

  function cleanPhone(){
    return phoneInput.value.trim().replace(/[^0-9]/g, '');
  }

  // بيرجع رقم المشترك الأساسي بدون رمز الدولة وبدون الصفر في الأول.
  // مثال: 0542580244 أو 971542580244 أو 542580244 كلهم بيرجعوا "542580244"
  function getSubscriberNumber(digits){
    if (digits.indexOf('971') === 0) {
      return digits.slice(3);
    }
    if (digits.charAt(0) === '0') {
      return digits.slice(1);
    }
    return digits;
  }

  // أرقام الموبايل الإماراتية: 9 أرقام بالظبط بعد شيل الصفر/رمز الدولة، وبتبدأ بـ 5 دايمًا.
  function isValidUAEMobile(digits){
    var sub = getSubscriberNumber(digits);
    return sub.length === 9 && sub.charAt(0) === '5';
  }

  function toInternational(digits){
    return '971' + getSubscriberNumber(digits);
  }

  var toastEl = document.getElementById('toast');
  var phoneField = document.getElementById('phoneField');
  var toastTimer = null;

  function showError(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    phoneField.classList.add('invalid');
    if (navigator.vibrate) {
      navigator.vibrate(180);
    }
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){
      toastEl.classList.remove('show');
    }, 2600);
  }

  phoneInput.addEventListener('input', function(){
    phoneField.classList.remove('invalid');
  });

  function updatePreview(){
    preview.textContent = msgSelect.value;
  }
  msgSelect.addEventListener('change', updatePreview);
  updatePreview();

  function sendToWhatsapp(){
    var phone = cleanPhone();
    if (phone === "") {
      showError("برجاء إدخال رقم الهاتف أولاً");
      phoneInput.focus();
      return;
    }
    if (!isValidUAEMobile(phone)) {
      showError("الرقم غير مكتمل، تأكد إنه رقم إماراتي صحيح");
      phoneInput.focus();
      return;
    }
    var intlPhone = toInternational(phone);
    addToRecent(phone);
    var message = msgSelect.value;
    var encodedMessage = encodeURIComponent(message);
    var url = "https://wa.me/" + intlPhone + "?text=" + encodedMessage;
    window.location.href = url;
  }

  function callCustomer(){
    var phone = cleanPhone();
    if (phone === "") {
      showError("برجاء إدخال رقم الهاتف أولاً");
      phoneInput.focus();
      return;
    }
    if (!isValidUAEMobile(phone)) {
      showError("الرقم غير مكتمل، تأكد إنه رقم إماراتي صحيح");
      phoneInput.focus();
      return;
    }
    var intlPhone = toInternational(phone);
    addToRecent(phone);
    window.location.href = "tel:+" + intlPhone;
  }

  // أرقام ثابتة للمطعم نفسه (مش أرقام عملاء)، من غير أي تحقق ديناميكي لأنها معروفة ومظبوطة يدويًا
  function openRestaurantWhatsapp(){
    window.location.href = "https://wa.me/971564223906";
  }

  function callRestaurant(){
    window.location.href = "tel:+97142837003";
  }

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function(){
      navigator.serviceWorker.register('sw.js').catch(function(){});
    });
  }
</script>
</body>
</html>
